<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StakeFlow — Simulador de Stakeholders</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #27272a;
            --bg-card: #18181b;
            --bg-hover: #27272a;
            --accent-main: #10b981;
            --accent-secondary: #0ea5e9;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --text-muted: #52525b;
            --border: rgba(255,255,255,0.08);
            --border-highlight: rgba(255,255,255,0.15);
            --font-display: 'Geist', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 8px;
            --radius-lg: 14px;
            --glass: rgba(24, 24, 27, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-display);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .glass-panel { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-highlight); border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-main); }

        .lucide { width: 1.25em; height: 1.25em; stroke-width: 1.5; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; height: 64px; background: var(--bg-secondary);
            border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 50;
        }
        .header-logo { display: flex; align-items: center; gap: 0.75rem; }
        .header-logo-icon {
            width: 34px; height: 34px; background: var(--accent-main);
            border-radius: var(--radius); display: flex; align-items: center;
            justify-content: center; color: #000; box-shadow: 0 0 20px -5px var(--accent-main);
        }
        .header-title { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.04em; }
        .header-version { font-size: 0.7rem; font-family: var(--font-mono); color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; margin-left: 0.5rem; }

        .mobile-toggle {
            display: none; background: var(--bg-tertiary); border: 1px solid var(--border);
            color: var(--text-primary); padding: 0.6rem; border-radius: var(--radius); cursor: pointer; transition: all 0.2s;
        }

        .main { display: flex; flex: 1; overflow: hidden; position: relative; }

        .panel-left, .panel-right { background: var(--bg-secondary); display: flex; flex-direction: column; overflow: hidden; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .panel-left { width: 280px; border-right: 1px solid var(--border); }
        .panel-right { width: 320px; border-left: 1px solid var(--border); }
        .panel-section { padding: 1.5rem; border-bottom: 1px solid var(--border); }
        .panel-label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }

        .setup-screen { position: fixed; inset: 0; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1.5rem; }
        .setup-container { width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; padding: 2.5rem; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .setup-header { text-align: center; margin-bottom: 3rem; }
        .setup-icon { width: 72px; height: 72px; background: var(--accent-main); border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; color: #000; margin: 0 auto 1.5rem; box-shadow: 0 0 50px -10px var(--accent-main); }
        .setup-title { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.06em; margin-bottom: 0.5rem; }
        .setup-subtitle { font-size: 0.95rem; color: var(--text-secondary); }

        .casos-grid, .niveles-grid { display: grid; gap: 0.85rem; margin-bottom: 2rem; }
        .casos-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .niveles-grid { grid-template-columns: repeat(3, 1fr); }

        .card { padding: 1.5rem; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); position: relative; }
        .card:hover { border-color: var(--accent-main); background: var(--bg-hover); transform: translateY(-4px); }
        .card.selected { border-color: var(--accent-main); background: rgba(16, 185, 129, 0.08); box-shadow: 0 0 20px -10px var(--accent-main); }
        .card-icon { color: var(--accent-main); margin-bottom: 1rem; }
        .card-title { font-weight: 700; font-size: 1rem; margin-bottom: 0.4rem; }
        .card-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; }

        .panel-center { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); position: relative; }
        .chat-header { padding: 1.25rem 2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1.25rem; }
        .chat-avatar { width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--accent-main); flex-shrink: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 2.5rem; display: flex; flex-direction: column; gap: 2rem; }

        .msg { display: flex; gap: 1.25rem; max-width: 80%; animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble { padding: 1.25rem 1.5rem; border-radius: 1.5rem; font-size: 0.95rem; line-height: 1.7; background: var(--bg-secondary); border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .msg.user .msg-bubble { background: var(--accent-main); color: #000; border: none; border-bottom-right-radius: 0.25rem; }
        .msg.assistant .msg-bubble { border-bottom-left-radius: 0.25rem; }

        .chat-input-area { padding: 2rem; background: var(--bg-secondary); border-top: 1px solid var(--border); }
        .chat-input-wrap { max-width: 860px; margin: 0 auto; display: flex; gap: 1rem; background: var(--bg-tertiary); padding: 0.6rem; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .chat-input { flex: 1; background: none; border: none; color: var(--text-primary); padding: 0.75rem 1rem; font-family: var(--font-display); font-size: 1rem; outline: none; resize: none; }

        .btn-primary { background: var(--accent-main); color: #000; font-weight: 800; padding: 0.85rem 1.75rem; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .hidden { display: none !important; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(9, 9, 11, 0.9); backdrop-filter: blur(8px); z-index: 300; display: flex; align-items: center; justify-content: center; }
        .spinner { width: 48px; height: 48px; border: 4px solid var(--bg-tertiary); border-top-color: var(--accent-main); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .panel-left, .panel-right { position: absolute; top: 0; bottom: 0; z-index: 40; box-shadow: 0 0 60px rgba(0, 0, 0, 0.7); }
            .panel-left { left: 0; transform: translateX(-100%); width: 300px; }
            .panel-right { right: 0; transform: translateX(100%); width: 300px; }
            .panel-left.open, .panel-right.active { transform: translateX(0); }
            .mobile-toggle { display: block; }
        }
    </style>
</head>
<body>
    <div class="setup-screen" id="setupScreen">
        <div class="setup-container">
            <div class="setup-header">
                <div class="setup-icon"><i data-lucide="sparkles"></i></div>
                <h1 class="setup-title">StakeFlow</h1>
                <p class="setup-subtitle">Impulsado por Google Gemini API (Free Tier)</p>
            </div>
            <div class="setup-section">
                <label class="panel-label">Google API Key</label>
                <input type="password" class="chat-input" id="apiKeyInput" placeholder="AIzaSy..."
                    style="width:100%; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-tertiary)"
                    oninput="checkSetupReady()" />
                <p style="font-size:0.7rem; color:var(--text-muted); margin-top:0.5rem">Obtén tu clave gratuita en <a href="https://aistudio.google.com/" target="_blank" style="color:var(--accent-main)">Google AI Studio</a></p>
            </div>
            <div class="setup-section">
                <label class="panel-label">Escenario de Entrenamiento</label>
                <div class="casos-grid" id="casosGrid"></div>
            </div>
            <div class="setup-section">
                <label class="panel-label">Nivel de Desafío</label>
                <div class="niveles-grid">
                    <div class="card" onclick="selectNivel(1)" id="nivel-1"><div class="card-title">Cooperativo</div><div class="card-desc">Respuestas fluidas.</div></div>
                    <div class="card" onclick="selectNivel(2)" id="nivel-2"><div class="card-title">Realista</div><div class="card-desc">Resistencia natural.</div></div>
                    <div class="card" onclick="selectNivel(3)" id="nivel-3"><div class="card-title">Adversarial</div><div class="card-desc">Agendas ocultas.</div></div>
                </div>
            </div>
            <button class="btn-primary" style="width:100%" id="btnStart" onclick="startSession()" disabled>Configurar Entorno →</button>
        </div>
    </div>

    <div class="header">
        <div class="header-logo">
            <div class="header-logo-icon"><i data-lucide="workflow"></i></div>
            <span class="header-title">StakeFlow <span class="header-version">v3.1</span></span>
        </div>
        <div class="header-right" style="display:flex; align-items:center; gap:0.75rem">
            <button class="mobile-toggle" onclick="toggleSidebar('left')"><i data-lucide="user-plus"></i></button>
            <span id="nivelLabel" style="font-size:0.75rem; font-weight:800; color:var(--accent-main); font-family:var(--font-mono); background:rgba(16,185,129,0.1); padding:4px 10px; border-radius:20px"></span>
            <button class="mobile-toggle" onclick="toggleSidebar('right')"><i data-lucide="layers"></i></button>
        </div>
    </div>

    <div class="main">
        <div class="panel-left" id="sidebarLeft">
            <div class="panel-section">
                <label class="panel-label"><i data-lucide="target" style="width:14px"></i> Caso Activo</label>
                <div style="display:flex; align-items:center; gap:1rem; background:var(--bg-tertiary); padding:1rem; border-radius:var(--radius); border:1px solid var(--border)">
                    <div class="chat-avatar" id="currentCasoIcon" style="width:40px; height:40px; border-radius:10px"></div>
                    <div>
                        <div id="currentCasoName" style="font-weight:800; font-size:1rem"></div>
                        <div id="currentNivelName" style="font-size:0.75rem; color:var(--text-secondary)"></div>
                    </div>
                </div>
            </div>
            <div class="panel-section">
                <label class="panel-label"><i data-lucide="users" style="width:14px"></i> Stakeholders</label>
                <div id="rolesList" style="display:grid; gap:0.75rem"></div>
            </div>
            <div class="panel-section" style="margin-top:auto; border-bottom:none">
                <div style="display:grid; gap:0.75rem">
                    <button class="card selected" style="padding:1rem; text-align:left; border-style:dashed" onclick="generateIEEE()"><i data-lucide="file-text" style="vertical-align:middle; margin-right:0.75rem"></i> IEEE 830</button>
                    <button class="card" style="padding:1rem; text-align:left" onclick="evaluateSession()"><i data-lucide="line-chart" style="vertical-align:middle; margin-right:0.75rem"></i> Evaluación</button>
                    <button class="card" style="padding:1rem; text-align:left; color:#f87171" onclick="resetSession()"><i data-lucide="power" style="vertical-align:middle; margin-right:0.75rem"></i> Reiniciar</button>
                </div>
            </div>
        </div>

        <div class="panel-center">
            <div class="chat-header glass-panel">
                <div class="chat-avatar" id="chatAvatar"></div>
                <div>
                    <div class="chat-persona-name" id="chatPersonaName" style="font-weight:800; font-size:1.1rem"></div>
                    <div id="chatPersonaRole" style="font-size:0.8rem; color:var(--text-secondary)"></div>
                </div>
                <div style="margin-left:auto; display:flex; align-items:center; gap:0.5rem">
                    <div style="width:8px; height:8px; background:var(--accent-main); border-radius:50%; box-shadow:0 0 10px var(--accent-main)"></div>
                    <span style="font-size:0.7rem; font-weight:700; color:var(--accent-main); letter-spacing:0.05em">LIVE</span>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <div class="chat-input-wrap">
                    <textarea class="chat-input" id="chatInput" placeholder="Formular pregunta técnica..." rows="1" onkeydown="handleInputKey(event)"></textarea>
                    <button class="btn-primary" id="btnSend" onclick="sendMessage()"><i data-lucide="send"></i></button>
                </div>
            </div>
        </div>

        <div class="panel-right" id="sidebarRight">
            <div class="panel-section">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <label class="panel-label" style="margin-bottom:0">Requerimientos</label>
                    <span id="reqsCount" style="background:var(--accent-main); color:#000; font-size:0.75rem; font-weight:900; padding:4px 10px; border-radius:10px">0</span>
                </div>
            </div>
            <div id="reqsList" style="flex:1; overflow-y:auto; padding:1.5rem; display:grid; gap:1rem"></div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="addReqModal" class="setup-screen hidden" style="background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:200">
        <div class="setup-container" style="max-width:520px; border-color:var(--accent-main)">
            <h2 class="card-title" style="font-size:1.5rem; margin-bottom:1.5rem">Nuevo Requisito</h2>
            <textarea id="reqDesc" class="chat-input" style="width:100%; height:160px; border:1px solid var(--border); border-radius:var(--radius); background:var(--bg-tertiary); margin-bottom:1.5rem" placeholder="Descripción..."></textarea>
            <div style="display:flex; gap:1rem">
                <button class="card" style="flex:1" onclick="closeModal('addReqModal')">Descartar</button>
                <button class="btn-primary" style="flex:1" onclick="saveReq()">Capturar RF</button>
            </div>
        </div>
    </div>

    <div id="ieeeModal" class="setup-screen hidden" style="background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:200">
        <div class="setup-container" style="max-width:900px; height:85vh; display:flex; flex-direction:column">
            <h2 class="card-title">IEEE 830 Specification</h2>
            <div id="ieeeOutput" style="flex:1; background:var(--bg-primary); padding:2rem; border-radius:var(--radius); overflow-y:auto; font-family:var(--font-mono); font-size:0.9rem; border:1px solid var(--border); white-space:pre-wrap; margin-top:1rem"></div>
            <div style="display:flex; gap:1rem; margin-top:2rem">
                <button class="card" style="flex:1" onclick="closeModal('ieeeModal')">Cerrar</button>
                <button class="btn-primary" style="flex:1" onclick="copyText('ieeeOutput')">Copiar</button>
            </div>
        </div>
    </div>

    <div id="evalModal" class="setup-screen hidden" style="background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); z-index:200">
        <div class="setup-container" style="max-width:600px">
            <h2 class="card-title">Feedback del Analista</h2>
            <div id="evalContent" style="background:var(--bg-tertiary); padding:2rem; border-radius:var(--radius); border:1px solid var(--border); font-size:0.95rem; line-height:1.8"></div>
            <button class="btn-primary" style="width:100%; margin-top:2rem" onclick="closeModal('evalModal')">Continuar</button>
        </div>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay"><div class="spinner"></div></div>

    <script>
        let state = { apiKey: '', caso: null, rol: 'sponsor', nivel: null, messages: [], requirements: [], rolesVisited: new Set(), userMsgCount: 0, pendingCapture: null };
        const CASOS = {
            1: { icon: 'hospital', name: 'Clínica Médica', roles: { sponsor: { icon: 'user-cog', name: 'Dr. Roberto', title: 'Médico Propietario' }, cliente: { icon: 'briefcase', name: 'Laura', title: 'Dir. Administrativa' }, usuario: { icon: 'users', name: 'Carlos', title: 'Recepcionista Senior' } } },
            2: { icon: 'utensils', name: 'Restaurante POS', roles: { sponsor: { icon: 'circle-dollar-sign', name: 'Martín', title: 'Socio Inversionista' }, cliente: { icon: 'chef-hat', name: 'Sofía', title: 'Gerente Operativa' }, usuario: { icon: 'calculator', name: 'Diego', title: 'Cajero de Turno' } } },
            3: { icon: 'graduation-cap', name: 'Gestión Académica', roles: { sponsor: { icon: 'landmark', name: 'Dra. Elena', title: 'Rectora General' }, cliente: { icon: 'book-open', name: 'Ing. Gómez', title: 'Jefe de Sistemas' }, usuario: { icon: 'user', name: 'Ana', title: 'Rep. Estudiantil' } } },
            4: { icon: 'dumbbell', name: 'Smart Gym Hub', roles: { sponsor: { icon: 'trending-up', name: 'Sr. Alejandro', title: 'Inversionista' }, cliente: { icon: 'user-square', name: 'Valeria', title: 'Gerente' }, usuario: { icon: 'clipboard-list', name: 'Lucas', title: 'Staff Recepción' } } }
        };
        const NIVEL_NAMES = { 1: 'Cooperativo', 2: 'Realista', 3: 'Adversarial' };

        window.addEventListener('DOMContentLoaded', () => {
            renderCasosGrid();
            const savedKey = localStorage.getItem('sk_sim_gemini');
            if (savedKey) try { document.getElementById('apiKeyInput').value = atob(savedKey); } catch (e) { }
            lucide.createIcons();
        });

        function renderCasosGrid() {
            document.getElementById('casosGrid').innerHTML = Object.entries(CASOS).map(([id, c]) => `
                <div class="card" onclick="selectCaso(${id})" id="caso-${id}">
                    <div class="card-icon"><i data-lucide="${c.icon}"></i></div>
                    <div class="card-title">${c.name}</div>
                    <div class="card-desc">Entrenamiento en ${c.name}.</div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function selectCaso(n) { state.caso = n; document.querySelectorAll('#casosGrid .card').forEach(c => c.classList.remove('selected')); document.getElementById(`caso-${n}`).classList.add('selected'); checkSetupReady(); }
        function selectNivel(n) { state.nivel = n; document.querySelectorAll('.niveles-grid .card').forEach(c => c.classList.remove('selected')); document.getElementById(`nivel-${n}`).classList.add('selected'); checkSetupReady(); }
        function checkSetupReady() { const key = document.getElementById('apiKeyInput').value.trim(); document.getElementById('btnStart').disabled = !(state.caso && state.nivel && key.length > 20); }

        async function startSession() {
            state.apiKey = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('sk_sim_gemini', btoa(state.apiKey));
            state.rolesVisited.add(state.rol);
            document.getElementById('setupScreen').classList.add('hidden');
            updateUI(); showLoading('CONECTANDO CON GEMINI...'); await initPersonaje(); hideLoading();
        }

        async function callGemini(userMsg, systemOverride = null) {
            const PERFILES = {
                1: { sponsor: 'Dr. Roberto, dueño conservador. Cuida el dinero.', cliente: 'Laura, administrativa entusiasta.', usuario: 'Carlos, recepcionista escéptico.' },
                2: { sponsor: 'Martín, socio enfocado en ROI.', cliente: 'Sofía, gerente agobiada.', usuario: 'Diego, cajero harto de fallos.' },
                3: { sponsor: 'Dra. Elena, rectora visionaria.', cliente: 'Ing. Gómez, nostálgico del sistema viejo.', usuario: 'Ana, alumna exigente.' },
                4: { sponsor: 'Sr. Alejandro, inversionista obsesionado con el fraude.', cliente: 'Valeria, gerente abrumada.', usuario: 'Lucas, recepcionista saturado.' }
            };
            const system = systemOverride || `ACTÚA COMO: ${PERFILES[state.caso][state.rol]} DIFICULTAD: ${NIVEL_NAMES[state.nivel]}. No menciones que eres IA. Responde corto. No des soluciones técnicas. Si te preguntan algo fuera de tu área, redirige al compañero adecuado.`;
            
            const contents = [];
            state.messages.forEach(m => {
                contents.push({
                    role: m.role === 'user' ? 'user' : 'model',
                    parts: [{ text: m.content }]
                });
            });

            if (userMsg) {
                contents.push({ role: 'user', parts: [{ text: userMsg }] });
            }

            // Fallback si contents está vacío
            if (contents.length === 0) {
                contents.push({ role: 'user', parts: [{ text: 'Hola' }] });
            }

            const payload = {
                system_instruction: {
                    parts: [{ text: system }]
                },
                contents: contents
            };

            try {
                // Endpoint para Gemini 1.5 Flash usando v1beta
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${state.apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error?.message || `Error ${res.status}: Fallo en la API.`);
                }
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    return data.candidates[0].content.parts[0].text;
                } else {
                    console.error('Respuesta inesperada:', data);
                    throw new Error('La IA no devolvió texto válido.');
                }
            } catch (e) {
                console.error('Error detallado de Gemini:', e);
                throw e;
            }
        }

        async function initPersonaje() { try { const reply = await callGemini('Preséntate brevemente y espera mi pregunta.'); state.messages.push({ role: 'assistant', content: reply }); addMessage('assistant', reply, CASOS[state.caso].roles[state.rol]); } catch (e) { addMessage('assistant', 'Error: ' + e.message, null); } }
        function updateUI() {
            const caso = CASOS[state.caso];
            document.getElementById('nivelLabel').textContent = `N${state.nivel}: ${NIVEL_NAMES[state.nivel].toUpperCase()}`;
            document.getElementById('currentCasoName').textContent = caso.name;
            document.getElementById('currentNivelName').textContent = NIVEL_NAMES[state.nivel];
            document.getElementById('currentCasoIcon').innerHTML = `<i data-lucide="${caso.icon}"></i>`;
            updateRolesList(); updateChatHeader(); renderReqs(); lucide.createIcons();
        }

        function updateRolesList() {
            document.getElementById('rolesList').innerHTML = Object.entries(CASOS[state.caso].roles).map(([key, r]) => `
                <button class="card ${key === state.rol ? 'selected' : ''}" style="padding:0.75rem; text-align:left; display:flex; align-items:center; gap:0.75rem; width:100%" onclick="switchRol('${key}')">
                    <i data-lucide="${r.icon}" style="width:16px"></i>
                    <div><div style="font-weight:800; font-size:0.8rem">${r.name}</div><div style="font-size:0.7rem; opacity:0.6">${r.title}</div></div>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function updateChatHeader() {
            const r = CASOS[state.caso].roles[state.rol];
            document.getElementById('chatAvatar').innerHTML = `<i data-lucide="${r.icon}"></i>`;
            document.getElementById('chatPersonaName').textContent = r.name;
            document.getElementById('chatPersonaRole').textContent = r.title;
            lucide.createIcons();
        }

        async function switchRol(newRol) { if (newRol === state.rol) return; state.rol = newRol; state.messages = []; state.rolesVisited.add(newRol); updateUI(); showLoading(); await initPersonaje(); hideLoading(); }

        function addMessage(role, content, rolData) {
            const div = document.createElement('div'); div.className = `msg ${role}`;
            const icon = role === 'user' ? 'user' : (rolData ? rolData.icon : 'info');
            div.innerHTML = `
                <div class="chat-avatar" style="width:32px; height:32px; border-radius:10px; background:var(--bg-tertiary)"><i data-lucide="${icon}"></i></div>
                <div style="flex:1">
                    <div class="msg-bubble">${content}</div>
                    <div style="font-size:0.65rem; color:var(--text-muted); margin-top:0.4rem; display:flex; align-items:center; gap:0.5rem">
                        <span>${role === 'user' ? 'ANALISTA' : rolData?.name.toUpperCase() || 'SISTEMA'}</span>
                        ${role === 'assistant' ? `<button onclick="openAddReqModal(\`${content.replace(/'/g, "\\'").replace(/"/g, '&quot;')}\`)" style="background:none; border:none; color:var(--accent-main); cursor:pointer; font-weight:800">+ REQUISITO</button>` : ''}
                    </div>
                </div>`;
            document.getElementById('chatMessages').appendChild(div); document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight; lucide.createIcons();
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput'); const text = input.value.trim();
            if (!text || document.getElementById('btnSend').disabled) return;
            input.value = ''; state.userMsgCount++; addMessage('user', text, null);
            state.messages.push({ role: 'user', content: text }); document.getElementById('btnSend').disabled = true;
            try { const reply = await callGemini(null); state.messages.push({ role: 'assistant', content: reply }); addMessage('assistant', reply, CASOS[state.caso].roles[state.rol]); }
            catch (e) { addMessage('assistant', `Error: ${e.message}`, null); }
            document.getElementById('btnSend').disabled = false;
        }

        function openAddReqModal(prefill = '') { state.pendingCapture = prefill; document.getElementById('reqDesc').value = prefill; document.getElementById('addReqModal').classList.remove('hidden'); }
        function saveReq() {
            const desc = document.getElementById('reqDesc').value.trim(); if (!desc) return;
            state.requirements.push({ id: `RF-${String(state.requirements.length + 1).padStart(3, '0')}`, desc, source: CASOS[state.caso].roles[state.rol].name });
            closeModal('addReqModal'); renderReqs();
        }

        function renderReqs() {
            document.getElementById('reqsCount').textContent = state.requirements.length;
            document.getElementById('reqsList').innerHTML = state.requirements.map(r => `
                <div class="card" style="padding:0.75rem; border-left:3px solid var(--accent-main)">
                    <div style="font-size:0.7rem; font-weight:900; color:var(--accent-main)">${r.id}</div>
                    <div style="font-size:0.8rem">${r.desc.substring(0, 100)}...</div>
                </div>
            `).join('') || '<div style="text-align:center; padding:2rem; color:var(--text-muted); font-size:0.8rem">Vacio.</div>';
        }

        function toggleSidebar(side) { if (side === 'left') document.getElementById('sidebarLeft').classList.toggle('open'); else document.getElementById('sidebarRight').classList.toggle('active'); }
        function handleInputKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function showLoading(t = 'PROCESANDO...') { document.getElementById('loadingOverlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function resetSession() { if (confirm('¿Reiniciar?')) location.reload(); }
        function copyText(id) { navigator.clipboard.writeText(document.getElementById(id).textContent); alert('Copiado'); }
        async function generateIEEE() {
            document.getElementById('ieeeModal').classList.remove('hidden'); document.getElementById('ieeeOutput').textContent = 'Generando borrador IEEE 830...';
            const reqs = state.requirements.map(r => `${r.id}: ${r.desc}`).join('\n');
            const res = await callGemini(`Genera un documento IEEE 830 técnico basado en estos requisitos: ${reqs}`);
            document.getElementById('ieeeOutput').textContent = res;
        }
        async function evaluateSession() {
            document.getElementById('evalModal').classList.remove('hidden'); document.getElementById('evalContent').textContent = 'Evaluando...';
            const conv = state.messages.map(m => `${m.role.toUpperCase()}: ${m.content}`).join('\n');
            const res = await callGemini(`Evalúa mi desempeño en esta entrevista de requerimientos: ${conv}. Dame un puntaje y consejos.`);
            document.getElementById('evalContent').textContent = res;
        }
    </script>
</body>
</html>
